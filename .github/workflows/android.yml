name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React App
        run: npm run build

      - name: Verify Capacitor Config
        run: |
          echo "Capacitor config files:"
          ls -la capacitor.config.* 2>/dev/null || echo "No config files found"
          if [ -f "capacitor.config.json" ]; then
            echo "capacitor.config.json content:"
            cat capacitor.config.json
          fi

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android

      - name: Set App Name to ShadowArts
        run: |
          STRINGS_FILE="android/app/src/main/res/values/strings.xml"
          if [ -f "$STRINGS_FILE" ]; then
            sed -i 's|<string name="app_name">.*</string>|<string name="app_name">ShadowArts</string>|g' "$STRINGS_FILE"
            echo "App name set to ShadowArts:"
            grep "app_name" "$STRINGS_FILE"
          else
            echo "WARNING: strings.xml not found at $STRINGS_FILE"
            find android -name "strings.xml" -type f 2>/dev/null
          fi

      - name: Generate App Icons
        run: |
          if [ -f "shadowarts.png" ]; then
            mkdir -p assets
            cp shadowarts.png assets/logo.png
            npm install -D @capacitor/assets
            npx @capacitor/assets generate --android --iconBackgroundColor '#1e1b4b' --splashBackgroundColor '#1e1b4b'
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowarts-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
