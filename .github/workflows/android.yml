name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          # Remove old android folder to ensure fresh build with correct name
          if [ -d "android" ]; then
            rm -rf android
          fi
          npx cap add android

      - name: Generate App Icons
        run: |
          if [ -f "shadowarts.png" ]; then
            mkdir -p assets
            cp shadowarts.png assets/logo.png
            npm install -D @capacitor/assets
            npx @capacitor/assets generate --android --iconBackgroundColor '#1e1b4b' --splashBackgroundColor '#1e1b4b'
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          # Replace app name in strings.xml (Android app display name) - more robust pattern
          find android -name "strings.xml" -exec sed -i 's/Költészet/ShadowArts/g' {} \;
          find android -name "strings.xml" -exec sed -i 's/Kolteszet/ShadowArts/g' {} \;
          # Replace package name in all relevant files
          find android -name "AndroidManifest.xml" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;
          find android -name "build.gradle" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;
          # Also replace applicationId in build.gradle (used by newer Android Gradle)
          find android -name "build.gradle" -exec sed -i 's/applicationId "hu.kolteszet.app"/applicationId "hu.shadowarts.app"/g' {} \;

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowarts-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
