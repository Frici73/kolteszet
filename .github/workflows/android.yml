name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          # Remove old android folder to ensure fresh build with correct name
          if [ -d "android" ]; then
            rm -rf android
          fi
          npx cap add android

      - name: Generate App Icons
        run: |
          if [ -f "shadowarts.png" ]; then
            mkdir -p assets
            cp shadowarts.png assets/logo.png
            npm install -D @capacitor/assets
            npx @capacitor/assets generate --android --iconBackgroundColor '#1e1b4b' --splashBackgroundColor '#1e1b4b'
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          # Replace app name in strings.xml (Android app display name) - more robust pattern
          find android -name "strings.xml" -exec sed -i 's/Költészet/ShadowArts/g' {} \;
          find android -name "strings.xml" -exec sed -i 's/Kolteszet/ShadowArts/g' {} \;
          # Replace package name in all relevant files
          find android -name "AndroidManifest.xml" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;
          find android -name "build.gradle" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;
          # Also replace applicationId in build.gradle (used by newer Android Gradle)
          find android -name "build.gradle" -exec sed -i 's/applicationId "hu.kolteszet.app"/applicationId "hu.shadowarts.app"/g' {} \;

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Configure Release Keystore
        run: |
          # Only configure keystore for release builds
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ "${{ secrets.KEYSTORE_BASE64 }}" != "" ]; then
            echo "Configuring release keystore..."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/keystore.jks
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            export SIGNING_ENABLED=true
          else
            export SIGNING_ENABLED=false
          fi
          echo "SIGNING_ENABLED=$SIGNING_ENABLED" >> $GITHUB_ENV

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build Release APK
        if: env.SIGNING_ENABLED == 'true'
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Debug APK Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadowarts-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload Release APK Artifact
        if: env.SIGNING_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: shadowarts-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Create Release
        if: env.SIGNING_ENABLED == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: v1.0.0
          name: ShadowArts v1.0.0
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
