name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Generate App Icons
        run: |
          if [ -f "shadowarts.png" ]; then
            mkdir -p assets
            cp shadowarts.png assets/logo.png
            npm install -D @capacitor/assets
            npx @capacitor/assets generate --android --iconBackgroundColor '#1e1b4b' --splashBackgroundColor '#1e1b4b'
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          # Replace app name in strings.xml (Android app display name)
          sed -i 's/>Költészet</>ShadowArts</g' android/app/src/main/res/values/strings.xml
          # Replace package name in AndroidManifest.xml
          sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' android/app/src/main/AndroidManifest.xml
          # Replace package name in build.gradle (if it exists there)
          sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' android/app/build.gradle 2>/dev/null || true

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build Android APK (Debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kolteszet-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
