name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build React App
        run: npm run build

      - name: Initialize Capacitor Android
        run: |
          if [ -d "android" ]; then
            rm -rf android
          fi
          npx cap add android

      - name: Generate App Icons
        run: |
          if [ -f "shadowarts.png" ]; then
            mkdir -p assets
            cp shadowarts.png assets/logo.png
            npm install -D @capacitor/assets
            npx @capacitor/assets generate --android --iconBackgroundColor '#1e1b4b' --splashBackgroundColor '#1e1b4b'
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android
          find android -name "strings.xml" -exec sed -i 's/Költészet/ShadowArts/g' {} \;
          find android -name "strings.xml" -exec sed -i 's/Kolteszet/ShadowArts/g' {} \;
          find android -name "AndroidManifest.xml" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;
          find android -name "build.gradle" -exec sed -i 's/hu.kolteszet.app/hu.shadowarts.app/g' {} \;

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Check Signing Secrets
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "signing=true" >> $GITHUB_OUTPUT
          else
            echo "signing=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Release Signing
        if: steps.keystore.outputs.signing == 'true'
        run: |
          # Keystore fájl létrehozása
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/shadowarts.keystore
          echo "Keystore created: $(ls -la android/app/shadowarts.keystore)"

          # gradle.properties a jelszavakhoz (biztonságos módszer)
          cat >> android/gradle.properties << EOF
          RELEASE_STORE_FILE=shadowarts.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}
          EOF

          echo "gradle.properties updated."

      - name: Patch app/build.gradle for signing
        if: steps.keystore.outputs.signing == 'true'
        run: |
          GRADLE="android/app/build.gradle"
          echo "=== EREDETI build.gradle ==="
          cat "$GRADLE"
          echo "=== VÉGE ==="

          # Python segítségével módosítjuk - megbízhatóbb mint a sed
          python3 << 'PYEOF'
          import re

          with open("android/app/build.gradle", "r") as f:
              content = f.read()

          signing_config = """
              signingConfigs {
                  release {
                      storeFile file(RELEASE_STORE_FILE)
                      storePassword RELEASE_STORE_PASSWORD
                      keyAlias RELEASE_KEY_ALIAS
                      keyPassword RELEASE_KEY_PASSWORD
                  }
              }
          """

          # signingConfigs blokk hozzáadása az android { blokk elejéhez
          content = content.replace("android {", "android {" + signing_config, 1)

          # release buildType-ban signingConfig beállítása
          content = re.sub(
              r'(buildTypes\s*\{[^}]*release\s*\{)',
              r'\1\n                signingConfig signingConfigs.release',
              content,
              flags=re.DOTALL
          )

          with open("android/app/build.gradle", "w") as f:
              f.write(content)

          print("build.gradle sikeresen módosítva!")
          PYEOF

          echo "=== MÓDOSÍTOTT build.gradle ==="
          cat "$GRADLE"


      - name: Build Release APK
        if: steps.keystore.outputs.signing == 'true'
        run: |
          cd android
          ./gradlew assembleRelease
          echo "=== Release output ==="
          ls -la app/build/outputs/apk/release/ || echo "Release mappa nem létezik!"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: shadowarts-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30
